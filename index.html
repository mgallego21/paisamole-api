<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paisamole SAS — Portal de Pedidos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>*{margin:0;padding:0;box-sizing:border-box}</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;


// ─── DATOS ────────────────────────────────────────────────────────────────────
const EMPRESA = {
  nombre: "Paisamole SAS",
  nit: "901.472.548-7",
  ciudad: "Colombia",
  color: "#3B6E22",
  colorClaro: "#EEF6E6",
  colorOscuro: "#1E3D10",
  acento: "#C8DC2A",
  acentoOscuro: "#8FA01A",
};

const PRODUCTOS = [
  { id: 1, nombre: "Paisamole Picante", presentacion: "200gr", empaque: "Tarrina", precio: 9411, iva: 1788.09, total: 11199.09, entrega: "4 días hábiles", minimo: 18 },
  { id: 2, nombre: "Guacamole Paisamole", presentacion: "200gr", empaque: "Tarrina", precio: 8800, iva: 1672, total: 10472, entrega: "4 días hábiles", minimo: 18 },
  { id: 3, nombre: "Molego", presentacion: "200gr", empaque: "Tarrina", precio: 4950, iva: 940.50, total: 5890.50, entrega: "4 días hábiles", minimo: 30 },
  { id: 4, nombre: "Guacamole Paisamole", presentacion: "400gr", empaque: "Tarrina", precio: 15246, iva: 2896.74, total: 18142.74, entrega: "4 días hábiles", minimo: 12 },
  { id: 5, nombre: "Aguacate Chunki", presentacion: "1000gr", empaque: "Bolsa", precio: 12500, iva: 2375, total: 14875, entrega: "4 días hábiles", minimo: 12 },
];

const ESTADOS = [
  { key: "pendiente", label: "Pendiente aprobación", color: "#F59E0B", bg: "#FEF3C7", icon: "⏳" },
  { key: "aprobado", label: "Aprobado", color: "#3B82F6", bg: "#DBEAFE", icon: "✅" },
  { key: "produccion", label: "En producción", color: "#8B5CF6", bg: "#EDE9FE", icon: "🏭" },
  { key: "listo", label: "Listo para despacho", color: "#10B981", bg: "#D1FAE5", icon: "📦" },
  { key: "despachado", label: "Despachado", color: "#6B7280", bg: "#F3F4F6", icon: "🚚" },
];

const fmt = (n) => new Intl.NumberFormat("es-CO", { style: "currency", currency: "COP", maximumFractionDigits: 0 }).format(n);
const fmtFecha = (iso) => new Date(iso).toLocaleDateString("es-CO", { day: "2-digit", month: "short", year: "numeric" });
const genId = () => "PED-" + Date.now().toString().slice(-7);

// ─── DEMO DATA ────────────────────────────────────────────────────────────────
const DEMO_PEDIDOS = [
  {
    id: "PED-0010001", estado: "pendiente", creado: new Date(Date.now() - 3600000).toISOString(),
    cliente: { tipo: "nit", doc: "800.125.989-1", razonSocial: "Supermercados La 14 S.A.", ciudad: "Cali", direccionFiscal: "Calle 5 # 44-20", direccionEntrega: "Av. 6N # 25-10", telefono: "6022345678", email: "compras@la14.com.co" },
    items: [{ ...PRODUCTOS[0], cantidad: 36 }, { ...PRODUCTOS[1], cantidad: 18 }],
    observaciones: "Entrega antes del mediodía", fechaEntrega: "2026-06-12",
  },
  {
    id: "PED-0010002", estado: "aprobado", creado: new Date(Date.now() - 86400000).toISOString(),
    cliente: { tipo: "nit", doc: "890.903.938-8", razonSocial: "Almacenes Éxito S.A.", ciudad: "Medellín", direccionFiscal: "Carrera 48 # 32-195", direccionEntrega: "Carrera 48 # 32-195", telefono: "6044444444", email: "logistica@exito.com.co" },
    items: [{ ...PRODUCTOS[3], cantidad: 24 }, { ...PRODUCTOS[4], cantidad: 12 }],
    observaciones: "", fechaEntrega: "2026-06-11",
  },
  {
    id: "PED-0010003", estado: "produccion", creado: new Date(Date.now() - 172800000).toISOString(),
    cliente: { tipo: "cedula", doc: "71.234.567", razonSocial: "Pedro Restrepo", ciudad: "Medellín", direccionFiscal: "", direccionEntrega: "Cra 70 # 44-50 Apto 301", telefono: "3016789012", email: "pedro.r@gmail.com" },
    items: [{ ...PRODUCTOS[2], cantidad: 60 }],
    observaciones: "Cliente nuevo, verificar dirección", fechaEntrega: "2026-06-10",
  },
];

// ─── CONSULTA RUES/DIAN (simulada con datos reales de prueba) ─────────────────
async function consultarIdentificacion(tipo, numero) {
  const nitLimpio = numero.replace(/[.\-\s]/g, "");
  
  // Solo consultar RUES para NITs (empresas)
  if (tipo === "nit") {
    if (nitLimpio.length < 9) return { ok: false, mensaje: "NIT muy corto. Verifica el número." };
    try {
      const resp = await fetch(`https://paisamole-api.vercel.app/api/rues?nit=${nitLimpio}`);
      if (resp.ok) {
        const data = await resp.json();
        if (data.ok) return { ok: true, ...data };
        return {
          ok: true,
          razonSocial: "", ciudad: "", direccion: "",
          pendienteVerificacion: true,
          mensaje: data.mensaje || "NIT no encontrado. Ingresa la razón social manualmente."
        };
      }
    } catch (e) {}
    return {
      ok: true,
      razonSocial: "", ciudad: "", direccion: "",
      pendienteVerificacion: true,
      mensaje: "No se pudo consultar el RUES. Ingresa la razón social manualmente."
    };
  }

  // Para cédulas (persona natural) — ingreso manual
  if (tipo === "cedula") {
    if (nitLimpio.length < 6) return { ok: false, mensaje: "Cédula muy corta. Verifica el número." };
    return {
      ok: true,
      razonSocial: "", ciudad: "", direccion: "",
      pendienteVerificacion: true,
      mensaje: "Ingresa tu nombre completo y ciudad."
    };
  }

  return { ok: false, mensaje: "Tipo de documento no válido." };
}

// ═══════════════════════════════════════════════════════════════════════════════
// FORMULARIO DE PEDIDO
// ═══════════════════════════════════════════════════════════════════════════════
function FormularioPedido({ onPedido }) {
  const [paso, setPaso] = useState(1);
  const [tipoDoc, setTipoDoc] = useState("nit");
  const [numDoc, setNumDoc] = useState("");
  const [buscando, setBuscando] = useState(false);
  const [clienteData, setClienteData] = useState(null);
  const [errorDoc, setErrorDoc] = useState("");
  const [direccionEntrega, setDireccionEntrega] = useState("");
  const [telefono, setTelefono] = useState("");
  const [email, setEmail] = useState("");
  const [items, setItems] = useState([]);
  const [observaciones, setObservaciones] = useState("");
  const [fechaEntrega, setFechaEntrega] = useState("");
  const [enviado, setEnviado] = useState(null);
  const [errors, setErrors] = useState({});

  const buscarCliente = async () => {
    if (!numDoc.trim()) return;
    setBuscando(true); setErrorDoc(""); setClienteData(null);
    const res = await consultarIdentificacion(tipoDoc, numDoc);
    setBuscando(false);
    if (res.ok) {
      setClienteData(res);
      setDireccionEntrega(res.direccion || "");
    } else {
      setErrorDoc("No se encontró información. Verifica el número.");
    }
  };

  const addItem = (prod) => {
    if (items.find(i => i.id === prod.id)) return;
    setItems([...items, { ...prod, cantidad: prod.minimo }]);
  };

  const updateCantidad = (id, val) => {
    const prod = PRODUCTOS.find(p => p.id === id);
    const cant = Math.max(prod.minimo, Number(val));
    setItems(items.map(i => i.id === id ? { ...i, cantidad: cant } : i));
  };

  const removeItem = (id) => setItems(items.filter(i => i.id !== id));

  const subtotal = items.reduce((a, i) => a + i.precio * i.cantidad, 0);
  const totalIva = items.reduce((a, i) => a + i.iva * i.cantidad, 0);
  const total = subtotal + totalIva;

  const validarPaso1 = () => {
    if (!clienteData) { setErrors({ doc: "Consulta el NIT o cédula primero" }); return false; }
    if (!direccionEntrega.trim()) { setErrors({ dir: "Ingresa la dirección de entrega" }); return false; }
    if (!telefono.trim()) { setErrors({ tel: "Ingresa un teléfono de contacto" }); return false; }
    setErrors({}); return true;
  };

  const validarPaso2 = () => {
    if (items.length === 0) { setErrors({ items: "Agrega al menos un producto" }); return false; }
    if (!fechaEntrega) { setErrors({ fecha: "Selecciona la fecha requerida" }); return false; }
    setErrors({}); return true;
  };

  const enviar = () => {
    if (!validarPaso2()) return;
    const pedido = {
      id: genId(), estado: "pendiente", creado: new Date().toISOString(),
      cliente: { tipo: tipoDoc, doc: numDoc, razonSocial: clienteData.razonSocial, ciudad: clienteData.ciudad, direccionFiscal: clienteData.direccion, direccionEntrega, telefono, email },
      items, observaciones, fechaEntrega,
    };
    onPedido(pedido);
    setEnviado(pedido);
  };

  if (enviado) return (
    <div style={s.successWrap}>
      <div style={s.successCard}>
        <img src="https://raw.githubusercontent.com/mgallego21/paisamole-api/main/logo.png" alt="Paisamole" style={{height:90, objectFit:'contain', margin:'0 auto 12px', display:'block'}} />
        <h2 style={s.successTitle}>¡Pedido recibido!</h2>
        <p style={s.successSub}>Tu pedido <strong>{enviado.id}</strong> fue registrado y está pendiente de aprobación. Te contactaremos pronto.</p>
        <div style={s.successDetail}>
          <div style={s.successRow}><span>Cliente</span><strong>{enviado.cliente.razonSocial}</strong></div>
          <div style={s.successRow}><span>Entrega solicitada</span><strong>{fmtFecha(enviado.fechaEntrega + "T12:00:00")}</strong></div>
          <div style={s.successRow}><span>Total estimado</span><strong style={{ color: EMPRESA.color }}>{fmt(enviado.items.reduce((a, i) => a + i.total * i.cantidad, 0))}</strong></div>
        </div>
        <button style={s.btnVerde} onClick={() => { setEnviado(null); setPaso(1); setClienteData(null); setNumDoc(""); setItems([]); setObservaciones(""); setFechaEntrega(""); setTelefono(""); setEmail(""); setDireccionEntrega(""); }}>
          Realizar otro pedido
        </button>
      </div>
    </div>
  );

  return (
    <div style={s.formWrap}>
      {/* HEADER */}
      <div style={s.formHeader}>
        <div style={s.headerLogo}>
          <img src="https://raw.githubusercontent.com/mgallego21/paisamole-api/main/logo.png" alt="Paisamole" style={{height: 72, objectFit: 'contain', display: 'block'}} />
        </div>
        <div style={s.headerTitle}>
          <h1 style={s.mainTitle}>Portal de Pedidos</h1>
          <p style={s.mainSub}>Realiza tu pedido B2B de forma rápida y segura</p>
        </div>
      </div>

      {/* STEPPER */}
      <div style={s.stepper}>
        {["Datos del cliente", "Productos y entrega", "Confirmar"].map((l, i) => (
          <div key={i} style={s.stepItem}>
            <div style={{ ...s.stepCircle, ...(paso > i + 1 ? s.stepDone : paso === i + 1 ? s.stepActive : {}) }}>
              {paso > i + 1 ? "✓" : i + 1}
            </div>
            <span style={{ ...s.stepLabel, ...(paso === i + 1 ? { color: EMPRESA.color, fontWeight: 700 } : {}) }}>{l}</span>
            {i < 2 && <div style={{ ...s.stepLine, ...(paso > i + 1 ? { background: EMPRESA.color } : {}) }} />}
          </div>
        ))}
      </div>

      <div style={s.formBody}>
        {/* PASO 1 */}
        {paso === 1 && (
          <div style={s.fadeIn}>
            <h3 style={s.secTitle}>Identificación del cliente</h3>
            <div style={s.docRow}>
              <div style={s.docTypeGroup}>
                {[{ v: "nit", l: "NIT (Empresa)" }, { v: "cedula", l: "Cédula (Persona natural)" }].map(t => (
                  <button key={t.v} style={{ ...s.docTypeBtn, ...(tipoDoc === t.v ? s.docTypeBtnActive : {}) }} onClick={() => { setTipoDoc(t.v); setClienteData(null); setNumDoc(""); setErrorDoc(""); }}>
                    {t.l}
                  </button>
                ))}
              </div>
              <div style={s.docInputRow}>
                <input style={{ ...s.input, flex: 1 }} placeholder={tipoDoc === "nit" ? "Ej: 900.123.456 (sin dígito de verificación)" : "Ej: 71.234.567"} value={numDoc} onChange={e => { setNumDoc(e.target.value); setClienteData(null); setErrorDoc(""); }} onKeyDown={e => e.key === "Enter" && buscarCliente()} />
                <button style={{ ...s.btnVerde, padding: "10px 22px", minWidth: 130 }} onClick={buscarCliente} disabled={buscando || !numDoc.trim()}>
                  {buscando ? <span style={s.spinner}>◌</span> : "🔍 Consultar"}
                </button>
              </div>
              {tipoDoc === "nit" && <p style={s.helperText}>⚠️ Ingresa el NIT <strong>sin</strong> el dígito de verificación (el número después del guión)</p>}
              {tipoDoc === "cedula" && <p style={s.helperText}>Ingresa el número de cédula sin puntos ni espacios</p>}
              {errorDoc && <p style={s.errorText}>{errorDoc}</p>}
              {errors.doc && <p style={s.errorText}>{errors.doc}</p>}
            </div>

            {clienteData && (
              <div style={s.clienteCard}>
                <div style={s.clienteCardHeader}>
                  <span style={s.clienteIcon}>{clienteData.pendienteVerificacion ? "⚠️" : "🏢"}</span>
                  <div style={{flex:1}}>
                    {clienteData.pendienteVerificacion ? (
                      <div>
                        <p style={{margin:"0 0 6px", fontSize:13, color:"#92400E"}}>{clienteData.mensaje}</p>
                        <input style={{...s.input, marginBottom:6}} placeholder={tipoDoc === "nit" ? "Razón social de la empresa" : "Nombre completo"} value={clienteData.razonSocial} onChange={e => setClienteData({...clienteData, razonSocial: e.target.value})} />
                        <input style={s.input} placeholder="Ciudad" value={clienteData.ciudad} onChange={e => setClienteData({...clienteData, ciudad: e.target.value})} />
                      </div>
                    ) : (
                      <div>
                        <div style={s.clienteNombre}>{clienteData.razonSocial}</div>
                        <div style={s.clienteCiudad}>{clienteData.ciudad}</div>
                      </div>
                    )}
                  </div>
                  {!clienteData.pendienteVerificacion && <span style={s.verificadoBadge}>✓ Verificado RUES</span>}
                  {clienteData.pendienteVerificacion && <span style={{...s.verificadoBadge, background:"#FEF3C7", color:"#92400E"}}>⚠️ Manual</span>}
                </div>
                {clienteData.direccion && <div style={s.clienteDirFiscal}>📍 Dirección fiscal: {clienteData.direccion}</div>}
              </div>
            )}

            {clienteData && (
              <div style={{ ...s.grid2, marginTop: 20 }}>
                <div style={s.field}>
                  <label style={s.label}>Dirección de entrega *</label>
                  <input style={{ ...s.input, ...(errors.dir ? s.inputError : {}) }} value={direccionEntrega} onChange={e => setDireccionEntrega(e.target.value)} placeholder="Calle / Carrera, número, barrio, ciudad" />
                  {errors.dir && <p style={s.errorText}>{errors.dir}</p>}
                </div>
                <div style={s.field}>
                  <label style={s.label}>Teléfono de contacto *</label>
                  <input style={{ ...s.input, ...(errors.tel ? s.inputError : {}) }} value={telefono} onChange={e => setTelefono(e.target.value)} placeholder="Ej: 3001234567" />
                  {errors.tel && <p style={s.errorText}>{errors.tel}</p>}
                </div>
                <div style={s.field}>
                  <label style={s.label}>Correo electrónico</label>
                  <input style={s.input} value={email} onChange={e => setEmail(e.target.value)} placeholder="compras@empresa.com" />
                </div>
              </div>
            )}

            <div style={s.navRow}>
              <div />
              <button style={{ ...s.btnVerde, opacity: clienteData ? 1 : 0.4 }} onClick={() => { if (validarPaso1()) setPaso(2); }} disabled={!clienteData}>
                Siguiente →
              </button>
            </div>
          </div>
        )}

        {/* PASO 2 */}
        {paso === 2 && (
          <div style={s.fadeIn}>
            <h3 style={s.secTitle}>Selecciona los productos</h3>
            <div style={s.prodGrid}>
              {PRODUCTOS.map(p => {
                const sel = items.find(i => i.id === p.id);
                return (
                  <div key={p.id} style={{ ...s.prodCard, ...(sel ? s.prodCardSel : {}) }} onClick={() => !sel && addItem(p)}>
                    <div style={s.prodEmoji}>{p.empaque === "Bolsa" ? "🥑" : "🫙"}</div>
                    <div style={s.prodInfo}>
                      <div style={s.prodNombre}>{p.nombre}</div>
                      <div style={s.prodPres}>{p.presentacion} · {p.empaque}</div>
                      <div style={s.prodPrecio}>{fmt(p.total)} <span style={s.prodIva}>c/IVA</span></div>
                      <div style={s.prodMin}>Mín. {p.minimo} und</div>
                    </div>
                    {sel
                      ? <div style={s.prodQty}>
                          <button style={s.qtyBtn} onClick={e => { e.stopPropagation(); updateCantidad(p.id, sel.cantidad - 1); }}>−</button>
                          <input style={s.qtyInput} type="number" value={sel.cantidad} onChange={e => { e.stopPropagation(); updateCantidad(p.id, e.target.value); }} onClick={e => e.stopPropagation()} />
                          <button style={s.qtyBtn} onClick={e => { e.stopPropagation(); updateCantidad(p.id, sel.cantidad + 1); }}>+</button>
                          <button style={s.removeProd} onClick={e => { e.stopPropagation(); removeItem(p.id); }}>✕</button>
                        </div>
                      : <div style={s.addBtn}>+ Agregar</div>
                    }
                  </div>
                );
              })}
            </div>
            {errors.items && <p style={s.errorText}>{errors.items}</p>}

            {items.length > 0 && (
              <div style={s.resumenBox}>
                <h4 style={s.resumenTitle}>Resumen del pedido</h4>
                {items.map(i => (
                  <div key={i.id} style={s.resumenRow}>
                    <span>{i.cantidad}× {i.nombre} {i.presentacion}</span>
                    <span>{fmt(i.total * i.cantidad)}</span>
                  </div>
                ))}
                <div style={s.resumenDivider} />
                <div style={{ ...s.resumenRow, fontWeight: 700, fontSize: 16 }}>
                  <span>Total con IVA</span>
                  <span style={{ color: EMPRESA.color }}>{fmt(total)}</span>
                </div>
              </div>
            )}

            <div style={{ ...s.grid2, marginTop: 20 }}>
              <div style={s.field}>
                <label style={s.label}>Fecha de entrega requerida *</label>
                <input style={{ ...s.input, ...(errors.fecha ? s.inputError : {}) }} type="date" value={fechaEntrega} onChange={e => setFechaEntrega(e.target.value)} {...{min: (() => {
                          // Calcular 4 días hábiles reales (sin sábados ni domingos)
                          let d = new Date();
                          let habiles = 0;
                          while (habiles < 4) {
                            d.setDate(d.getDate() + 1);
                            const dow = d.getDay();
                            if (dow !== 0 && dow !== 6) habiles++; // 0=dom, 6=sab
                          }
                          return d.toISOString().split("T")[0];
                        })()}} />
                {errors.fecha && <p style={s.errorText}>{errors.fecha}</p>}
                <p style={{ fontSize: 11, color: "#94A3B8", margin: "4px 0 0" }}>⏱ Tiempo mínimo: 4 días hábiles (lunes a viernes). Los días anteriores están bloqueados.</p>
              </div>
              <div style={s.field}>
                <label style={s.label}>Observaciones</label>
                <textarea style={{ ...s.input, minHeight: 72, resize: "vertical" }} value={observaciones} onChange={e => setObservaciones(e.target.value)} placeholder="Instrucciones especiales de entrega, refrigeración, etc." />
              </div>
            </div>

            <div style={s.navRow}>
              <button style={s.btnOutline} onClick={() => setPaso(1)}>← Volver</button>
              <button style={s.btnVerde} onClick={() => { if (validarPaso2()) setPaso(3); }}>Continuar →</button>
            </div>
          </div>
        )}

        {/* PASO 3 */}
        {paso === 3 && (
          <div style={s.fadeIn}>
            <h3 style={s.secTitle}>Confirma tu pedido</h3>
            <div style={s.confirmGrid}>
              <div style={s.confirmCard}>
                <div style={s.confirmCardTitle}>👤 Cliente</div>
                <div style={s.confirmLine}><span>Razón social</span><strong>{clienteData?.razonSocial}</strong></div>
                <div style={s.confirmLine}><span>{tipoDoc === "nit" ? "NIT" : "Cédula"}</span><strong>{numDoc}</strong></div>
                <div style={s.confirmLine}><span>Ciudad</span><strong>{clienteData?.ciudad}</strong></div>
                <div style={s.confirmLine}><span>Entrega en</span><strong>{direccionEntrega}</strong></div>
                <div style={s.confirmLine}><span>Teléfono</span><strong>{telefono}</strong></div>
                {email && <div style={s.confirmLine}><span>Email</span><strong>{email}</strong></div>}
              </div>
              <div style={s.confirmCard}>
                <div style={s.confirmCardTitle}>📦 Productos</div>
                {items.map(i => (
                  <div key={i.id} style={s.confirmLine}>
                    <span>{i.cantidad}× {i.nombre} {i.presentacion}</span>
                    <strong>{fmt(i.total * i.cantidad)}</strong>
                  </div>
                ))}
                <div style={{ ...s.confirmLine, borderTop: "1px solid #E2E8F0", paddingTop: 10, marginTop: 6 }}>
                  <span>Subtotal sin IVA</span><strong>{fmt(subtotal)}</strong>
                </div>
                <div style={s.confirmLine}><span>IVA</span><strong>{fmt(totalIva)}</strong></div>
                <div style={{ ...s.confirmLine, fontWeight: 800, fontSize: 16 }}>
                  <span>Total</span><strong style={{ color: EMPRESA.color }}>{fmt(total)}</strong>
                </div>
              </div>
            </div>
            <div style={s.confirmCard}>
              <div style={s.confirmCardTitle}>🚚 Entrega</div>
              <div style={s.confirmLine}><span>Fecha solicitada</span><strong>{fmtFecha(fechaEntrega + "T12:00:00")}</strong></div>
              {observaciones && <div style={s.confirmLine}><span>Observaciones</span><strong>{observaciones}</strong></div>}
            </div>
            <div style={s.aviso}>

    setPdfFile(file);
    setPdfStatus("leyendo");
    setPdfError("");

      setPdfExtracted(data);

    } catch(e) {

      setPdfError("No se pudo leer el PDF. Verifica que sea un archivo válido.");

  const confirmarPedido = () => {
    if (!pdfExtracted) return;

      .filter(i => i.productoId && PRODUCTOS_MAP[i.productoId])
      .map(i => ({ ...PRODUCTOS_MAP[i.productoId], cantidad: i.cantidad || PRODUCTOS_MAP[i.productoId].minimo }));

      id: genId(),

        ciudad: pdfExtracted.ciudad || "",

        direccionEntrega: pdfExtracted.direccionEntrega || "",
        telefono: pdfExtracted.telefono || "",
        email: pdfExtracted.email || "",
      },
      items,
      observaciones: pdfExtracted.observaciones || "",
      fechaEntrega: pdfExtracted.fechaEntrega || "",
    };
    onPedidoImportado(pedido);
    setPdfFile(null); setPdfExtracted(null); setPdfStatus("idle");
  };

  return (
    <div style={s.importWrap}>
      <div style={s.importHeader}>
        <h2 style={s.importTitle}>📄 Importar Orden de Compra</h2>
        <p style={s.importSub}>Sube el PDF y la IA extrae automáticamente cliente, productos y cantidades</p>
      </div>

      {pdfStatus === "idle" && (
        <label style={s.dropZone}>

          <div style={s.dropSub}>Funciona con cualquier formato de orden de compra</div>

        <div style={s.processingBox}>
          <div style={s.processingSpinner}>🤖</div>
          <div style={s.processingText}>Leyendo orden de compra con IA...</div>

      {pdfStatus === "error" && (

      {pdfStatus === "revisando" && pdfExtracted && (
        <div style={s.extractedCard}>

              </div>

              <div style={s.extractedRow}><span>Dir. entrega</span>

              </div>

                    <select style={s.extractedSelect}

                        setPdfExtracted({...pdfExtracted, items});

                      <option value="">— No coincide —</option>
                      {Object.values(PRODUCTOS_MAP).map(p => <option key={p.id} value={p.id}>{p.nombre} {p.presentacion}</option>)}
                    </select>
                  </div>
                  <div style={s.extractedQty}>
                    <span style={{fontSize:12, color:"#64748B"}}>Cant.</span>
                    <input type="number" style={{...s.extractedInput, width:70, textAlign:"center"}}
                      value={item.cantidad||""}

                  </div>

              {pdfExtracted.observaciones && (

// ─── LECTOR PDF CON IA ───────────────────────────────────────────────────────
async function leerOrdenCompraConIA(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const base64 = e.target.result.split(',')[1];
        const response = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1000,
            messages: [{
              role: "user",
              content: [
                {
                  type: "document",
                  source: { type: "base64", media_type: "application/pdf", data: base64 }
                },
                {
                  type: "text",
                  text: `Eres un asistente de Paisamole SAS, empresa colombiana de guacamole. Analiza esta orden de compra y extrae la información en formato JSON. 
                  
Los productos de Paisamole SAS son:
- Paisamole Picante 200gr
- Guacamole Paisamole 200gr  
- Molego 200gr
- Guacamole Paisamole 400gr
- Aguacate Chunki 1000gr

Responde SOLO con un JSON válido, sin texto adicional, sin markdown:
{
  "razonSocial": "nombre del cliente/empresa que emite la orden",
  "nit": "NIT o identificación del cliente si aparece",
  "ciudad": "ciudad del cliente",
  "direccionEntrega": "dirección de entrega si aparece",
  "telefono": "teléfono si aparece",
  "email": "email si aparece",
  "fechaEntrega": "fecha de entrega requerida en formato YYYY-MM-DD, si no hay pon null",
  "numerOrden": "número de orden de compra si aparece",
  "observaciones": "notas u observaciones relevantes",
  "items": [
    {
      "nombreOriginal": "nombre exacto del producto en la orden",
      "productoId": número del 1 al 5 del producto Paisamole más parecido o null si no coincide,
      "cantidad": número entero de unidades,
      "precioUnitario": precio unitario si aparece o null
    }
  ]
}`
                }
              ]
            }]
          })
        });
        const data = await response.json();
        const text = data.content?.[0]?.text || "";
        const clean = text.replace(/```json|```/g, "").trim();
        const parsed = JSON.parse(clean);
        resolve(parsed);
      } catch(err) {
        reject(err);
      }
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

                    <strong>{fmt(i.total * i.cantidad)}</strong>

                ))}
                <div style={{ ...s.modalLine, borderTop: "1px solid #E2E8F0", paddingTop: 8, marginTop: 4, fontWeight: 700 }}>
                  <span>TOTAL c/IVA</span>
                  <strong style={{ color: EMPRESA.color }}>{fmt(detalle.items.reduce((a, i) => a + i.total * i.cantidad, 0))}</strong>
                </div>
              </div>
              {detalle.observaciones && (
                <div style={s.modalSection}>
                  <div style={s.modalSecTitle}>Observaciones</div>
                  <p style={{ margin: 0, color: "#475569", fontSize: 13 }}>{detalle.observaciones}</p>
                </div>
              )}
              <div style={{ display: "flex", gap: 10, marginTop: 20 }}>
                <select style={{ ...s.selectAccion, flex: 1, padding: "10px 12px" }} value={detalle.estado} onChange={e => { onEstado(detalle.id, e.target.value); setDetalle({ ...detalle, estado: e.target.value }); }}>
                  {ESTADOS.map(e => <option key={e.key} value={e.key}>{e.icon} {e.label}</option>)}
                </select>
                <button style={s.btnVerde} onClick={() => setDetalle(null)}>Cerrar</button>
              </div>
            </div>
          </div>
        </div>
      )}
      </React.Fragment>
      )}
    </div>
  );
}

// APP ROOT
// ═══════════════════════════════════════════════════════════════════════════════
function App() {
  const [vista, setVista] = useState("pedido");
  const [pedidos, setPedidos] = useState(DEMO_PEDIDOS);
  const pendientes = pedidos.filter(p => p.estado === "pendiente").length;

  return (
    <div style={s.root}>
      <nav style={s.nav}>
        <div style={s.navBrand}>
          <img src="https://raw.githubusercontent.com/mgallego21/paisamole-api/main/logo.png" alt="Paisamole" style={{height: 48, objectFit: 'contain', display: 'block'}} />
        </div>
        <div style={s.navTabs}>
          <button style={{ ...s.navTab, ...(vista === "pedido" ? s.navTabActive : {}) }} onClick={() => setVista("pedido")}>
            📋 Hacer Pedido
          </button>
          <button style={{ ...s.navTab, ...(vista === "panel" ? s.navTabActive : {}) }} onClick={() => setVista("panel")}>
            🏭 Panel Producción
            {pendientes > 0 && <span style={s.notif}>{pendientes}</span>}
          </button>
        </div>
      </nav>
      <main>
        {vista === "pedido"
          ? <FormularioPedido onPedido={p => { setPedidos(prev => [p, ...prev]); setVista("panel"); }} />
          : <PanelProduccion pedidos={pedidos} onEstado={(id, est) => setPedidos(prev => prev.map(p => p.id === id ? { ...p, estado: est } : p))} onNuevoPedido={p => setPedidos(prev => [p, ...prev])} />
        }
      </main>
    </div>
  );
}
